<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Office — AI Agent Dashboard</title>
    <style>
        @font-face {
            font-family: 'ArkPixel';
            src: url('/ui/fonts/ark-pixel-12px-proportional-zh_cn.ttf.woff2') format('woff2');
            font-weight: normal; font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0e17;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
            font-family: 'ArkPixel', 'Courier New', monospace;
            color: #fffffe;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            image-rendering: pixelated;
            border: 2px solid #2e2e4a;
            border-radius: 8px;
            overflow: hidden;
        }
        #game-container canvas { display: block; }

        /* Settings Modal */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 9999;
            justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1a1a2e; border: 2px solid #7f5af0;
            border-radius: 12px; padding: 24px; width: 420px; max-width: 90vw;
            color: #fffffe;
        }
        .modal h2 { font-size: 18px; margin-bottom: 16px; color: #7f5af0; }
        .modal label { display: block; font-size: 13px; margin: 12px 0 4px; color: #94a1b2; }
        .modal input[type="text"] {
            width: 100%; padding: 8px 12px; font-size: 14px;
            background: #16161a; border: 1px solid #2e2e4a; border-radius: 6px;
            color: #fffffe; font-family: inherit;
        }
        .avatar-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            margin: 8px 0;
        }
        .avatar-option {
            width: 64px; height: 64px; border: 2px solid #2e2e4a;
            border-radius: 8px; cursor: pointer; background: #16161a;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.2s;
            image-rendering: pixelated;
        }
        .avatar-option:hover { border-color: #7f5af0; }
        .avatar-option.selected { border-color: #2cb67d; border-width: 3px; }
        .avatar-option img { width: 48px; height: 48px; image-rendering: pixelated; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }
        .modal-buttons button {
            padding: 8px 20px; border: none; border-radius: 6px;
            font-family: inherit; font-size: 14px; cursor: pointer;
        }
        .btn-save { background: #7f5af0; color: white; }
        .btn-save:hover { background: #6b4bd6; }
        .btn-cancel { background: #2e2e4a; color: #94a1b2; }
        .btn-cancel:hover { background: #3e3e5a; }

        /* Detail Panel */
        .detail-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 9998;
            justify-content: center; align-items: center;
        }
        .detail-overlay.active { display: flex; }
        .detail-panel {
            background: #1a1a2e; border: 2px solid #7f5af0;
            border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw;
            color: #fffffe;
        }
        .detail-panel h2 { font-size: 18px; margin-bottom: 12px; color: #7f5af0; }
        .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #2e2e4a; }
        .detail-label { color: #94a1b2; font-size: 13px; }
        .detail-value { font-size: 13px; color: #fffffe; }
        .detail-progress { margin: 12px 0; }
        .detail-progress-bar {
            width: 100%; height: 12px; background: #16161a; border-radius: 6px; overflow: hidden;
        }
        .detail-progress-fill {
            height: 100%; border-radius: 6px; transition: width 0.3s ease;
        }
        .detail-close {
            margin-top: 16px; padding: 8px 20px; border: none; border-radius: 6px;
            background: #2e2e4a; color: #94a1b2; font-family: inherit; cursor: pointer;
            font-size: 14px; float: right;
        }
        .detail-close:hover { background: #3e3e5a; }

        /* Agent Sidebar */
        #agent-sidebar {
            position: fixed; top: 0; right: 0; width: 260px; height: 100vh;
            background: #1a1a2e; border-left: 2px solid #2e2e4a;
            z-index: 9990; transform: translateX(100%);
            transition: transform 0.3s ease; overflow-y: auto;
            padding: 16px;
        }
        #agent-sidebar.open { transform: translateX(0); }
        #agent-sidebar h3 { font-size: 14px; color: #7f5af0; margin-bottom: 12px; }
        .sidebar-agent {
            display: flex; align-items: center; gap: 8px;
            padding: 8px; margin-bottom: 6px; border-radius: 6px;
            background: #16161a; cursor: pointer; transition: background 0.2s;
        }
        .sidebar-agent:hover { background: #2e2e4a; }
        .sidebar-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }
        .sidebar-name { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar-state { font-size: 10px; color: #94a1b2; flex-shrink: 0; }
        #sidebar-toggle {
            position: fixed; top: 12px; right: 12px; z-index: 9991;
            width: 36px; height: 36px; border-radius: 8px; border: 1px solid #2e2e4a;
            background: #1a1a2e; color: #94a1b2; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        #sidebar-toggle:hover { background: #2e2e4a; }

        /* Toast Notifications */
        #toast-container {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 10000; display: flex; flex-direction: column; gap: 8px;
            align-items: center; pointer-events: none;
        }
        .toast {
            background: #1a1a2e; border: 1px solid #7f5af0; border-radius: 8px;
            padding: 8px 16px; font-size: 12px; color: #fffffe;
            font-family: 'ArkPixel', 'Courier New', monospace;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
            pointer-events: auto; white-space: nowrap;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

        /* History Timeline Panel */
        .history-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 9997;
            justify-content: center; align-items: center;
        }
        .history-overlay.active { display: flex; }
        .history-panel {
            background: #1a1a2e; border: 2px solid #7f5af0;
            border-radius: 12px; padding: 24px; width: 560px; max-width: 90vw;
            max-height: 80vh; color: #fffffe; display: flex; flex-direction: column;
        }
        .history-panel h2 { font-size: 18px; margin-bottom: 8px; color: #7f5af0; }
        .history-controls { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
        .history-controls select, .history-controls button {
            padding: 6px 12px; font-size: 12px; font-family: inherit;
            background: #16161a; border: 1px solid #2e2e4a; border-radius: 6px;
            color: #fffffe; cursor: pointer;
        }
        .history-controls button:hover { background: #2e2e4a; }
        .history-summary {
            background: #16161a; border-radius: 8px; padding: 12px;
            margin-bottom: 12px; font-size: 12px;
        }
        .history-summary .stat { display: inline-block; margin-right: 16px; }
        .history-summary .stat-label { color: #94a1b2; }
        .history-summary .stat-value { color: #2cb67d; font-weight: bold; }
        .history-timeline {
            flex: 1; overflow-y: auto; max-height: 400px;
        }
        .timeline-entry {
            display: flex; gap: 12px; padding: 8px 0;
            border-bottom: 1px solid #2e2e4a; font-size: 12px;
        }
        .timeline-time { color: #94a1b2; min-width: 70px; flex-shrink: 0; }
        .timeline-state {
            min-width: 80px; flex-shrink: 0; text-transform: uppercase;
            font-weight: bold; font-size: 11px;
        }
        .timeline-arrow { color: #555; flex-shrink: 0; }
        .timeline-msg { color: #fffffe; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-close {
            margin-top: 16px; padding: 8px 20px; border: none; border-radius: 6px;
            background: #2e2e4a; color: #94a1b2; font-family: inherit; cursor: pointer;
            font-size: 14px; float: right;
        }
        .history-close:hover { background: #3e3e5a; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Sidebar Toggle -->
    <button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>

    <!-- Agent Sidebar -->
    <div id="agent-sidebar">
        <h3>Agent 列表</h3>
        <div id="sidebar-agent-list"></div>
    </div>

    <!-- Agent Detail Panel -->
    <div class="detail-overlay" id="detail-panel" onclick="if(event.target===this)closeDetail()">
        <div class="detail-panel">
            <h2 id="detail-title">Agent Details</h2>
            <div id="detail-content"></div>
            <button class="detail-close" onclick="closeDetail()">關閉</button>
        </div>
    </div>

    <!-- History Timeline Panel -->
    <div class="history-overlay" id="history-panel" onclick="if(event.target===this)closeHistory()">
        <div class="history-panel">
            <h2 id="history-title">📜 歷史紀錄</h2>
            <div class="history-controls">
                <select id="history-hours" onchange="refreshHistory()">
                    <option value="1">最近 1 小時</option>
                    <option value="6">最近 6 小時</option>
                    <option value="24" selected>最近 24 小時</option>
                    <option value="72">最近 3 天</option>
                    <option value="168">最近 7 天</option>
                </select>
                <button onclick="refreshHistory()">🔄 重新整理</button>
            </div>
            <div class="history-summary" id="history-summary"></div>
            <div class="history-timeline" id="history-timeline"></div>
            <button class="history-close" onclick="closeHistory()">關閉</button>
        </div>
    </div>

    <!-- Agent Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h2>⚙ Agent 設定</h2>
            <label>顯示名稱 Display Name</label>
            <input type="text" id="setting-display-name" placeholder="例：Agent K">
            <label>頭像 Avatar</label>
            <div class="avatar-grid" id="avatar-grid"></div>
            <input type="text" id="setting-avatar-custom" placeholder="自訂頭像路徑（選填）">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeSettings()">取消</button>
                <button class="btn-save" onclick="saveSettings()">儲存</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="/ui/office-scene.js"></script>
    <script>
    // --- Settings Modal Logic ---
    let settingsAgentId = null;
    let selectedAvatar = '';

    function openSettings(agentId, currentDisplayName, currentAvatar) {
        settingsAgentId = agentId;
        document.getElementById('setting-display-name').value = currentDisplayName || '';
        document.getElementById('setting-avatar-custom').value = '';
        selectedAvatar = currentAvatar || '';

        // Build avatar grid
        const grid = document.getElementById('avatar-grid');
        grid.innerHTML = '';
        const avatars = [
            'char_blue', 'char_green', 'char_red', 'char_purple',
            'char_orange', 'char_cyan', 'char_pink', 'char_yellow'
        ];
        avatars.forEach(av => {
            const div = document.createElement('div');
            div.className = 'avatar-option' + (av === selectedAvatar ? ' selected' : '');
            div.innerHTML = `<span style="font-size:28px">${avatarEmoji(av)}</span>`;
            div.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                selectedAvatar = av;
            };
            grid.appendChild(div);
        });

        document.getElementById('settings-modal').classList.add('active');
    }

    function closeSettings() {
        document.getElementById('settings-modal').classList.remove('active');
        settingsAgentId = null;
    }

    function avatarEmoji(key) {
        const map = {
            char_blue: '🔵', char_green: '🟢', char_red: '🔴', char_purple: '🟣',
            char_orange: '🟠', char_cyan: '💠', char_pink: '🩷', char_yellow: '🟡'
        };
        return map[key] || '⬜';
    }

    // --- Detail Panel Logic ---
    function openDetail(agent) {
        const stateColorMap = {
            idle: '#94a1b2', writing: '#7f5af0', researching: '#72f1d4',
            executing: '#2cb67d', syncing: '#f9a825', error: '#ff6b6b',
        };
        const stateIconMap = {
            idle: '💤', writing: '✍️', researching: '🔍',
            executing: '⚡', syncing: '🔄', error: '🐛',
        };
        const color = stateColorMap[agent.state] || '#94a1b2';
        const icon = stateIconMap[agent.state] || '❓';
        const updated = new Date(agent.last_updated * 1000).toLocaleString('zh-TW');
        const created = new Date(agent.created_at * 1000).toLocaleString('zh-TW');

        document.getElementById('detail-title').textContent = `${icon} ${agent.label || agent.name}`;
        let html = '';
        html += `<div class="detail-row"><span class="detail-label">ID</span><span class="detail-value">#${agent.id}</span></div>`;
        html += `<div class="detail-row"><span class="detail-label">名稱 Name</span><span class="detail-value">${agent.name}</span></div>`;
        if (agent.display_name) {
            html += `<div class="detail-row"><span class="detail-label">暱稱 Nickname</span><span class="detail-value">${agent.display_name}</span></div>`;
        }
        html += `<div class="detail-row"><span class="detail-label">狀態 State</span><span class="detail-value" style="color:${color}">${agent.state.toUpperCase()}</span></div>`;
        if (agent.message) {
            html += `<div class="detail-row"><span class="detail-label">工作內容</span><span class="detail-value">${agent.message}</span></div>`;
        }
        if (agent.progress > 0) {
            html += `<div class="detail-progress">`;
            html += `<div class="detail-row"><span class="detail-label">進度 Progress</span><span class="detail-value">${agent.progress}%</span></div>`;
            html += `<div class="detail-progress-bar"><div class="detail-progress-fill" style="width:${agent.progress}%;background:${color}"></div></div>`;
            html += `</div>`;
        }
        html += `<div class="detail-row"><span class="detail-label">頭像 Avatar</span><span class="detail-value">${agent.avatar || 'default'}</span></div>`;
        html += `<div class="detail-row"><span class="detail-label">TTL</span><span class="detail-value">${agent.ttl}s</span></div>`;
        html += `<div class="detail-row"><span class="detail-label">最後更新</span><span class="detail-value">${updated}</span></div>`;
        html += `<div class="detail-row"><span class="detail-label">建立時間</span><span class="detail-value">${created}</span></div>`;
        html += `<div style="margin-top:12px"><button onclick="closeDetail();openHistory('${agent.id}')" style="padding:6px 16px;border:1px solid #7f5af0;border-radius:6px;background:transparent;color:#7f5af0;font-family:inherit;font-size:12px;cursor:pointer">📜 查看歷史紀錄</button></div>`;

        document.getElementById('detail-content').innerHTML = html;
        document.getElementById('detail-panel').classList.add('active');
    }

    function closeDetail() {
        document.getElementById('detail-panel').classList.remove('active');
    }

    // --- Sidebar Logic ---
    function toggleSidebar() {
        document.getElementById('agent-sidebar').classList.toggle('open');
    }

    function updateSidebar(agents) {
        const stateColorMap = {
            idle: '#94a1b2', writing: '#7f5af0', researching: '#72f1d4',
            executing: '#2cb67d', syncing: '#f9a825', error: '#ff6b6b',
        };
        const list = document.getElementById('sidebar-agent-list');
        list.innerHTML = '';
        agents.forEach(agent => {
            const div = document.createElement('div');
            div.className = 'sidebar-agent';
            div.onclick = () => openDetail(agent);
            const color = stateColorMap[agent.state] || '#94a1b2';
            div.innerHTML = `<span class="sidebar-dot" style="background:${color}"></span>`
                + `<span class="sidebar-name">${agent.label || agent.name}</span>`
                + `<span class="sidebar-state">${agent.state}</span>`;
            list.appendChild(div);
        });
    }

    // --- Toast Notification Logic ---
    let previousStates = {};

    function checkStateChanges(agents) {
        agents.forEach(agent => {
            const prev = previousStates[agent.id];
            if (prev && prev !== agent.state) {
                showToast(`${agent.label || agent.name} → ${agent.state.toUpperCase()}${agent.message ? ': ' + agent.message : ''}`);
            }
            previousStates[agent.id] = agent.state;
        });
    }

    function showToast(message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // --- History Timeline Logic ---
    let historyAgentId = null;

    async function openHistory(agentId) {
        historyAgentId = agentId;
        document.getElementById('history-title').textContent = `📜 ${agentId} 歷史紀錄`;
        document.getElementById('history-panel').classList.add('active');
        await refreshHistory();
    }

    function closeHistory() {
        document.getElementById('history-panel').classList.remove('active');
        historyAgentId = null;
    }

    async function refreshHistory() {
        if (!historyAgentId) return;
        const hours = document.getElementById('history-hours').value;

        try {
            // Fetch history and summary in parallel
            const [histRes, sumRes] = await Promise.all([
                fetch(`/agents/${historyAgentId}/history?hours=${hours}&limit=200`),
                fetch(`/agents/${historyAgentId}/summary?hours=${hours}`)
            ]);
            const histData = await histRes.json();
            const sumData = await sumRes.json();

            // Render summary
            const summaryEl = document.getElementById('history-summary');
            if (sumData.total_entries === 0) {
                summaryEl.innerHTML = '<span style="color:#94a1b2">此時段無紀錄</span>';
            } else {
                let stateCounts = Object.entries(sumData.state_counts || {})
                    .map(([s, c]) => `<span class="stat"><span class="stat-label">${s}:</span> <span class="stat-value">${c}</span></span>`)
                    .join('');
                summaryEl.innerHTML = `<span class="stat"><span class="stat-label">紀錄數:</span> <span class="stat-value">${sumData.total_entries}</span></span> ${stateCounts}`;
            }

            // Render timeline
            const stateColorMap = {
                idle: '#94a1b2', writing: '#7f5af0', researching: '#72f1d4',
                executing: '#2cb67d', syncing: '#f9a825', error: '#ff6b6b',
            };
            const stateIconMap = {
                idle: '💤', writing: '✍️', researching: '🔍',
                executing: '⚡', syncing: '🔄', error: '🐛',
            };
            const timelineEl = document.getElementById('history-timeline');
            const entries = histData.entries || [];
            if (entries.length === 0) {
                timelineEl.innerHTML = '<div style="color:#94a1b2;text-align:center;padding:20px">此時段無歷史紀錄</div>';
            } else {
                timelineEl.innerHTML = entries.map(e => {
                    const t = new Date(e.timestamp * 1000);
                    const timeStr = t.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
                    const dateStr = t.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });
                    const color = stateColorMap[e.state] || '#94a1b2';
                    const icon = stateIconMap[e.state] || '❓';
                    const arrow = e.prev_state ? `<span class="timeline-arrow">${e.prev_state} →</span>` : '';
                    const msg = e.message ? e.message : '';
                    return `<div class="timeline-entry">
                        <span class="timeline-time">${dateStr} ${timeStr}</span>
                        ${arrow}
                        <span class="timeline-state" style="color:${color}">${icon} ${e.state}</span>
                        <span class="timeline-msg">${msg}</span>
                    </div>`;
                }).join('');
            }
        } catch (err) {
            console.error('Failed to load history:', err);
            document.getElementById('history-timeline').innerHTML =
                '<div style="color:#ff6b6b;text-align:center;padding:20px">載入失敗</div>';
        }
    }

    async function saveSettings() {
        if (!settingsAgentId) return;
        const displayName = document.getElementById('setting-display-name').value.trim();
        const customAvatar = document.getElementById('setting-avatar-custom').value.trim();
        const avatar = customAvatar || selectedAvatar;

        try {
            const res = await fetch(`/agents/${settingsAgentId}/profile`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ display_name: displayName || null, avatar: avatar || null })
            });
            if (res.ok) {
                closeSettings();
                // Trigger immediate refresh in Phaser scene
                if (window.starOfficeScene) window.starOfficeScene.fetchAgents();
            }
        } catch (e) {
            console.error('Failed to save profile:', e);
        }
    }
    </script>
</body>
</html>
